services:
  was1: &was
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3000
      - INSTANCE_ID=was1
      - MONGO_URI=mongodb://host.docker.internal:27017/sns03
      - REDIS_URL=redis://host.docker.internal:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=http://localhost
      - TRUST_PROXY=true
      - LOG_TO_STDOUT_ONLY=true
      - ACCESS_TOKEN_TTL=${ACCESS_TOKEN_TTL:-15m}
      - REFRESH_TOKEN_TTL=${REFRESH_TOKEN_TTL:-14d}
      - UPLOAD_DIR=/app/uploads
      - PUBLIC_UPLOAD_URL=/uploads
      - RATE_LIMIT_GLOBAL=${RATE_LIMIT_GLOBAL:-100}
      - RATE_LIMIT_LOGIN=${RATE_LIMIT_LOGIN:-10}
    volumes:
      - uploads:/app/uploads
    depends_on: []
    restart: unless-stopped

  was2:
    <<: *was
    environment:
      - PORT=3000
      - INSTANCE_ID=was2
      - MONGO_URI=mongodb://host.docker.internal:27017/sns03
      - REDIS_URL=redis://host.docker.internal:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=http://localhost
      - TRUST_PROXY=true
      - LOG_TO_STDOUT_ONLY=true
      - ACCESS_TOKEN_TTL=${ACCESS_TOKEN_TTL:-15m}
      - REFRESH_TOKEN_TTL=${REFRESH_TOKEN_TTL:-14d}
      - UPLOAD_DIR=/app/uploads
      - PUBLIC_UPLOAD_URL=/uploads
      - RATE_LIMIT_GLOBAL=${RATE_LIMIT_GLOBAL:-100}
      - RATE_LIMIT_LOGIN=${RATE_LIMIT_LOGIN:-10}

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - was1
      - was2
    restart: unless-stopped

volumes:
  uploads:
